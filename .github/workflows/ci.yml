name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('documentation/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting with Prettier
        run: bun run format:check

      - name: Lint with ESLint
        run: bun run lint

  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('documentation/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript check
        run: bun run typecheck

  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('documentation/bun.lock') }}
          restore-keys: |
            bun-

      - name: Cache build output
        uses: actions/cache@v4
        with:
          path: documentation/build
          key: build-${{ github.sha }}
          restore-keys: |
            build-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build documentation
        run: bun run build

      - name: Verify build artifact
        run: |
          if [ ! -d build ]; then
            echo "❌ Build directory not found"
            exit 1
          fi
          if [ ! -f build/index.html ]; then
            echo "❌ index.html not found in build directory"
            exit 1
          fi
          echo "✅ Build artifact verified"
          echo "Build size: $(du -sh build | cut -f1)"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-build
          path: documentation/build
          retention-days: 5

  validate-deployment:
    name: Validate Deployment Setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./documentation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check lockfile exists
        run: |
          if [ ! -f bun.lock ]; then
            echo "❌ bun.lock not found in documentation/"
            exit 1
          fi
          echo "✅ bun.lock found"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('documentation/bun.lock') }}
          restore-keys: |
            bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate workflow syntax
        run: |
          if ! grep -q "actions/configure-pages" ../.github/workflows/deploy.yml; then
            echo "❌ Missing actions/configure-pages in deploy workflow"
            exit 1
          fi
          if ! grep -q "actions/deploy-pages" ../.github/workflows/deploy.yml; then
            echo "❌ Missing actions/deploy-pages in deploy workflow"
            exit 1
          fi
          echo "✅ Workflow syntax validated"

  test-examples:
    name: Test Code Examples
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            examples/target
          key: cargo-examples-${{ hashFiles('examples/**/Cargo.toml') }}
          restore-keys: |
            cargo-examples-

      - name: Run example tests
        run: bash scripts/test-examples.sh

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-format, typecheck, build-docs, validate-deployment, test-examples]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint-format.result }}" != "success" ]; then
            echo "❌ Lint & Format check failed"
            exit 1
          fi
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "❌ TypeScript check failed"
            exit 1
          fi
          if [ "${{ needs.build-docs.result }}" != "success" ]; then
            echo "❌ Documentation build failed"
            exit 1
          fi
          if [ "${{ needs.validate-deployment.result }}" != "success" ]; then
            echo "❌ Deployment validation failed"
            exit 1
          fi
          if [ "${{ needs.test-examples.result }}" != "success" ]; then
            echo "❌ Code example tests failed"
            exit 1
          fi
          echo "✅ All CI checks passed"
